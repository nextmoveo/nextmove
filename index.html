input,textarea{padding:12px;border-radius:5px;border:none}
button{background:#FF6B00;color:#fff;padding:12px;border:none;border-radius:5px;cursor:pointer}
footer{text-align:center;padding:20px;color:#666}

<div class="logo">NEXTMOVE</div>
<p>📞 +49 176 640 08327</p>
